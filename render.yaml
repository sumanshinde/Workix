services:
  # Backend API Service
  - type: web
    name: workix-api-cluster
    runtime: node
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        value: mongodb_url_placeholder
      - key: JWT_SECRET
        value: change_me_to_random_secret
      - key: CLIENT_URL
        value: https://workix-1.onrender.com

  # Frontend Next.js Service
  - type: web
    name: workix-1
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://workix-api-cluster.onrender.com/api
      - key: NEXTAUTH_URL
        value: https://workix-1.onrender.com
      - key: NEXTAUTH_SECRET
        value: change_me_to_random_secret_32chars
      - key: NODE_ENV
        value: production
